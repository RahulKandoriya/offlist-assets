<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="title">Why one privacy law isn't enough: your country's law plus the US data-broker layer</title>
  <desc id="desc">Each country has its own privacy law that governs data held locally: the United Kingdom under UK GDPR, Canada under PIPEDA, Australia under the Privacy Act 1988, France under GDPR and CNIL, Germany under GDPR and BDSG, and the Netherlands under GDPR and UAVG. But beneath all of them sits a layer of US-based people-search data brokers that hold your information regardless of where you live. Your local data-protection authority does not reach those US brokers; a separate US opt-out does.</desc>
  <rect width="1200" height="540" rx="24" fill="#ffffff"/>
  <rect x="1" y="1" width="1198" height="538" rx="23" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <rect x="48" y="40" width="11" height="11" rx="2" fill="#dc2626"/>
  <text x="70" y="50" font-size="15" font-weight="700" letter-spacing="1.5" fill="#dc2626">WHY ONE LAW ISN'T ENOUGH</text>
  <text x="48" y="92" font-size="30" font-weight="800" fill="#0f172a">Your country's law sits on a US broker layer</text>
  <text x="48" y="120" font-size="15" fill="#475569">Each national law governs data held locally. A separate layer of US people-search brokers holds it too.</text>

  <!-- Top tier: 6 country cards -->
  <text x="48" y="162" font-size="12.5" font-weight="700" letter-spacing="1" fill="#94a3b8">YOUR LOCAL PRIVACY LAW &#8212; GOVERNS DATA HELD IN YOUR COUNTRY</text>

  <g>
    <!-- card 1 UK -->
    <rect x="52" y="176" width="171" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="137" y="210" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">United Kingdom</text>
    <rect x="92" y="226" width="91" height="26" rx="13" fill="#e2e8f0"/>
    <text x="137" y="244" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">UK GDPR</text>
    <!-- card 2 Canada -->
    <rect x="237" y="176" width="171" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="322" y="210" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">Canada</text>
    <rect x="282" y="226" width="80" height="26" rx="13" fill="#e2e8f0"/>
    <text x="322" y="244" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">PIPEDA</text>
    <!-- card 3 Australia -->
    <rect x="422" y="176" width="171" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="507" y="210" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">Australia</text>
    <rect x="447" y="226" width="120" height="26" rx="13" fill="#e2e8f0"/>
    <text x="507" y="244" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">Privacy Act 1988</text>
    <!-- card 4 France -->
    <rect x="607" y="176" width="171" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="692" y="210" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">France</text>
    <rect x="637" y="226" width="110" height="26" rx="13" fill="#e2e8f0"/>
    <text x="692" y="244" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">GDPR + CNIL</text>
    <!-- card 5 Germany -->
    <rect x="792" y="176" width="171" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="877" y="210" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">Germany</text>
    <rect x="822" y="226" width="110" height="26" rx="13" fill="#e2e8f0"/>
    <text x="877" y="244" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">GDPR + BDSG</text>
    <!-- card 6 Netherlands -->
    <rect x="977" y="176" width="171" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="1062" y="210" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">Netherlands</text>
    <rect x="1007" y="226" width="111" height="26" rx="13" fill="#e2e8f0"/>
    <text x="1062" y="244" font-size="13" font-weight="700" fill="#475569" text-anchor="middle">GDPR + UAVG</text>
  </g>

  <!-- Connector arrows down -->
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="137" y1="276" x2="137" y2="316"/><line x1="322" y1="276" x2="322" y2="316"/>
    <line x1="507" y1="276" x2="507" y2="316"/><line x1="692" y1="276" x2="692" y2="316"/>
    <line x1="877" y1="276" x2="877" y2="316"/><line x1="1062" y1="276" x2="1062" y2="316"/>
  </g>
  <g fill="#94a3b8">
    <path d="M137 322 l-6 -9 h12 z"/><path d="M322 322 l-6 -9 h12 z"/><path d="M507 322 l-6 -9 h12 z"/>
    <path d="M692 322 l-6 -9 h12 z"/><path d="M877 322 l-6 -9 h12 z"/><path d="M1062 322 l-6 -9 h12 z"/>
  </g>

  <!-- Bottom tier: US broker layer -->
  <rect x="48" y="330" width="1104" height="130" rx="16" fill="#0f172a"/>
  <rect x="68" y="354" width="11" height="11" rx="2" fill="#dc2626"/>
  <text x="90" y="364" font-size="13" font-weight="700" letter-spacing="1.5" fill="#fca5a5">REACHED BY A US OPT-OUT, NOT YOUR LOCAL DPA</text>
  <text x="68" y="398" font-size="22" font-weight="800" fill="#ffffff">The US people-search broker layer</text>
  <text x="68" y="426" font-size="14.5" fill="#cbd5e1">Hundreds of US-based brokers resell your personal data no matter which country you live in. Your national</text>
  <text x="68" y="446" font-size="14.5" fill="#cbd5e1">privacy law doesn't reach them &#8212; deleting from this layer takes a separate, US-style opt-out for each broker.</text>

  <text x="48" y="512" font-size="13" fill="#94a3b8">Use your local law for domestic registries and sites, then opt out of the US broker layer as a second, parallel step.</text>
  <text x="1152" y="512" font-size="14" font-weight="800" fill="#0f172a" text-anchor="end">OfflistMe</text>
</svg>
